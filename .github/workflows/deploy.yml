name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # Build job - validates the frontend
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run verification tests
        run: npm run verify
        continue-on-error: true

      - name: Validate HTML files
        run: |
          echo "✓ Checking HTML files..."
          test -f index.html && echo "✓ index.html found" || exit 1
          test -f login.html && echo "✓ login.html found" || exit 1
          test -f register.html && echo "✓ register.html found" || exit 1
          test -f dashboard.html && echo "✓ dashboard.html found" || exit 1

      - name: Check for API URL configuration
        run: |
          echo "✓ Verifying API configuration..."
          grep -q "getAPIBaseURL" login.html && echo "✓ API URL detection found"
          grep -q "BACKEND_API_URL\|getAPIBaseURL" login.html && echo "✓ Frontend is configured"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

  # Deploy job
  deploy:
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Print deployment info
        run: |
          echo "✅ Deployment successful!"
          echo "📱 Site URL: ${{ steps.deployment.outputs.page_url }}"
          echo "🔧 Next: Update backend API URL in HTML files"
          echo "📖 See GITHUB_PAGES_DEPLOYMENT.md for configuration"
